<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Autor del documento -->
    <meta name="author" content="donovansaez@liceovvh.cl">
    <!-- Enlace con CSS -->
    <link rel="stylesheet" href="static/css/style.css">
    <!-- Título de la página -->
    <title>Maquetación Web</title>
</head>

<body>
    <!-- Caja gris de fondo -->
    <div class="cajagris">
        <!-- Cabecera de la página-->
        <header>
            <h1>Website Title</h1>
        </header>

        <!-- Contenedor de la página -->
        <main class="contenedor">
            <!-- Barra lateral izquierda de la página -->
            <aside class="barralateral">
                <button class="botonlateral">Button 1</button>
                <button class="botonlateral">Button 2</button>
            </aside>

            <!-- Sección derecha del contenedor -->
            <section>
                <!-- Caja roja de fondo -->
                <div class="cajaroja">
                    <!-- Contenedor de las tarjetas -->
                    <div class="contendortarjetas">
                        <div class="tarjeta"></div>
                        <div class="tarjeta"></div>
                        <div class="tarjeta"></div>
                    </div>

                    <!-- Caja morada -->
                    <div class="cajamorada">
                        <button class="botonmas">Learn More</button>
                    </div>
                </div>

                <!-- Pié de página -->
                <footer class="pie">
                    <div class="lineagris"></div>
                    <div class="lineagris"></div>
                    <!-- Tercera línea exclusiva para ser más corta -->
                    <div class="lineatres">
                        <div class="lineagris"></div>
                    </div>
                </footer>
            </section>
        </main>
    </div>

    <!-- Enlace con JavaScript -->
    <script src="static/js/script.js"></script>
</body>

</html>
